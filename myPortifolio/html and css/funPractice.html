    function convertLength(length, from, to) {
      const conversionRates = {
          'km': {
              'km': 1,
              'miles': 1 / 1.6,
              'ft': 3281
          },
          'miles': {
              'miles': 1,
              'km': 1.6,
              'ft': 5280
          },
          'ft': {
              'ft': 1,
              'km': 1 / 3281,
              'miles': 1 / 5280
          }
      };

      const validUnits = ['km', 'miles', 'ft'];

      if (!validUnits.includes(from)) {
          return `Invalid unit: ${from}`;
      }
      if (!validUnits.includes(to)) {
          return `Invalid unit: ${to}`;
      }

      const inTarget = length * conversionRates[from][to];
      return `${inTarget} ${to}`;
    }

    console.log(convertLength(50, 'miles', 'km'));    // '80 km'
    console.log(convertLength(32, 'km', 'miles'));    // '20 miles'
    console.log(convertLength(50, 'km', 'km'));       // '50 km'

    console.log(convertLength(5, 'miles', 'km'));     // '8 km'
    console.log(convertLength(5, 'miles', 'ft'));     // '26400 ft'
    console.log(convertLength(5, 'km', 'ft'));        // '16405 ft'

    console.log(convertLength(5, 'lbs', 'lbs'));      // 'Invalid unit: lbs'
