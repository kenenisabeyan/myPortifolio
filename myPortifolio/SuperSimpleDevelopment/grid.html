<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Grid Layout</title>
  <link rel="stylesheet" href="styles.css">


  <style>

    body {
  margin: 0;
  padding: 20px;
  background: #eee;
  font-family: Arial, sans-serif;
}

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* 3 equal columns */
  gap: 20px;
}

.box {
  height: 150px;
  padding: 5px;
  font-size: 14px;
  font-weight: bold;
}

/* Colors */
.blue {
  background-color: #8fb3c1;
}

.pink {
  background-color: #e59aa3;
}


  </style>
</head>

<body>

  <div class="container">
    <div class="box blue">1fr</div>
    <div class="box pink">1fr</div>
    <div class="box blue">1fr</div>
    <div class="box pink">1fr</div>
    <div class="box blue">1fr</div>
    <div class="box pink">1fr</div>
  </div>

</body>

</html>
